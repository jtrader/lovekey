<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Love Key – NFC Keyring for Safety & Wellbeing Support</title>
    <meta name="description" content="Love Key Guardian is an NFC keyring that connects you to mental health support and emergency helplines with one tap. 50% of profits donated to Lifeline.">
    <meta name="author" content="Love Key" />
    <meta name="keywords" content="NFC keyring, mental health support, safety keyring, wellbeing, Lifeline, emergency help, Love Key, smart keyring, QR code keyring">
    <!-- Canonical is set per-route via react-helmet-async -->

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lovekey.com.au/" />
    <meta property="og:title" content="Love Key – Smart NFC Keyring for Safety & Wellbeing Support">
    <meta property="og:description" content="One tap or scan connects you to mental health support, emergency helplines, and wellbeing resources. 50% of profits donated to Lifeline & Bendigo Health Foundation.">
    <meta property="og:image" content="https://lovekey.com.au/og-image.png" />
    <meta property="og:image:alt" content="Love Key NFC keyring with QR code – a small keyring that can make a big difference" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Love Key" />
    <meta property="og:locale" content="en_AU" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@LoveKey" />
    <meta name="twitter:title" content="Love Key – Smart NFC Keyring for Safety & Wellbeing Support">
    <meta name="twitter:description" content="One tap or scan connects you to mental health support, emergency helplines, and wellbeing resources. 50% of profits donated to Lifeline.">
    <meta name="twitter:image" content="https://lovekey.com.au/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Google tag (gtag.js) — loaded lazily by src/lib/gaBotGuard.ts after
         a human engagement signal to keep GA4 in sync with Lovable analytics
         (no bot/prerender/link-preview inflation). Only the queue stub is set
         up here so early trackEvent() calls are queued and flushed later. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      window.gtag = window.gtag || function () { window.dataLayer.push(arguments); };
    </script>


    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Love Key",
      "url": "https://lovekey.com.au",
      "logo": "https://lovekey.com.au/favicon.ico",
      "description": "Smart NFC-enabled keyrings connecting people to life-saving mental health and wellbeing support resources.",
      "sameAs": []
    }
    </script>

    <!-- Product and FAQPage JSON-LD are rendered on the homepage only via react-helmet-async -->

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
